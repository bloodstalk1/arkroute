run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck      # unchecked errors
    - gosimple      # simplifications
    - govet         # std vet
    - ineffassign   # unused assignments
    - staticcheck   # bug finder
    - unused        # unused identifiers
    - bodyclose     # http body not closed
    - nakedret      # naked returns in funcs > 5 lines

linters-settings:
  gosimple:
    checks: ["all"]
  staticcheck:
    checks: ["all"]
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
    - path: internal/panel/assets/
      linters: [all]
    # The streaming executor deliberately closes the body in a goroutine
    # via sync.Once; bodyclose cannot trace that path.
    - path: internal/runtime/executor.go
      linters: [bodyclose]
  max-issues-per-linter: 50
  max-same-issues: 10
