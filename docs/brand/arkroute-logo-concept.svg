<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Arkroute premium logo and brand-kit concept</title>
  <desc id="desc">A dark developer-tool brand board for Arkroute with a geometric route-gateway logo mark, construction panel, UI application, palette, typography, and system details.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171a1c"/>
      <stop offset="1" stop-color="#0b0d0f"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dffcff"/>
      <stop offset="0.38" stop-color="#6ee7f5"/>
      <stop offset="1" stop-color="#8aff6a"/>
    </linearGradient>
    <linearGradient id="routeMist" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7f5" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#8aff6a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8c7bff" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.88 0 0 0 0 0.94 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="fineGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.08"/>
    </pattern>
    <symbol id="arkrouteMark" viewBox="0 0 220 220">
      <path d="M110 26 L185 184 H151 L136 150 H84 L69 184 H35 L110 26 Z" fill="none" stroke="currentColor" stroke-width="18" stroke-linejoin="round"/>
      <path d="M78 119 H142" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round"/>
      <path d="M44 78 H87 C101 78 110 91 110 106 V119" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M176 78 H133 C119 78 110 91 110 106 V119" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M110 119 V188" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round"/>
      <circle cx="44" cy="78" r="9" fill="currentColor"/>
      <circle cx="176" cy="78" r="9" fill="currentColor"/>
      <circle cx="110" cy="188" r="9" fill="currentColor"/>
      <path d="M110 93 L131 119 L110 145 L89 119 Z" fill="#0b0d0f"/>
    </symbol>
    <style>
      .bg { fill: #060708; }
      .board { fill: url(#panel); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .label { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; letter-spacing: 2px; fill: #727b83; text-transform: uppercase; }
      .small { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 15px; fill: #8f989f; }
      .body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #e9f4f2; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e9f4f2; }
      .muted { fill: #8f989f; }
      .rule { stroke: #ffffff; stroke-opacity: 0.08; stroke-width: 1; }
      .cyan { fill: #6ee7f5; }
      .lime { fill: #8aff6a; }
      .violet { fill: #8c7bff; }
      .cream { fill: #e9f4f2; }
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#fineGrid)" opacity="0.7"/>
  <text x="74" y="58" class="label">ARKROUTE / IDENTITY SYSTEM / CONCEPT 01</text>
  <text x="1462" y="58" text-anchor="end" class="label">LOCAL AI ROUTER</text>

  <!-- Panel grid -->
  <g filter="url(#paperShadow)">
    <rect x="70" y="90" width="460" height="260" rx="8" class="board"/>
    <rect x="570" y="90" width="460" height="260" rx="8" class="board"/>
    <rect x="1070" y="90" width="460" height="260" rx="8" class="board"/>
    <rect x="70" y="390" width="460" height="220" rx="8" class="board"/>
    <rect x="570" y="390" width="460" height="220" rx="8" class="board"/>
    <rect x="1070" y="390" width="460" height="220" rx="8" class="board"/>
    <rect x="70" y="650" width="460" height="260" rx="8" class="board"/>
    <rect x="570" y="650" width="460" height="260" rx="8" class="board"/>
    <rect x="1070" y="650" width="460" height="260" rx="8" class="board"/>
  </g>

  <!-- 1 Logo cover -->
  <g transform="translate(70 90)">
    <text x="28" y="36" class="label">01 / LOGO COVER</text>
    <g transform="translate(84 55)" color="#e9f4f2" filter="url(#softGlow)">
      <use href="#arkrouteMark" width="135" height="135"/>
    </g>
    <text x="232" y="124" class="body" font-size="50" font-weight="700">Arkroute</text>
    <text x="236" y="154" class="label">LOCAL AI ROUTER</text>
    <path d="M28 218 H432" class="rule"/>
    <text x="28" y="240" class="small">one gateway / many providers / local control</text>
  </g>

  <!-- 2 Construction -->
  <g transform="translate(570 90)">
    <text x="28" y="36" class="label">02 / CONSTRUCTION</text>
    <rect x="66" y="62" width="180" height="150" fill="url(#fineGrid)" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="156" cy="74" r="70" fill="none" stroke="#6ee7f5" stroke-opacity="0.28" stroke-width="1"/>
    <circle cx="156" cy="184" r="70" fill="none" stroke="#8aff6a" stroke-opacity="0.22" stroke-width="1"/>
    <g transform="translate(64 42)" color="#e9f4f2">
      <use href="#arkrouteMark" width="184" height="184"/>
    </g>
    <path d="M287 92 H413" stroke="#6ee7f5" stroke-opacity="0.7" stroke-width="2"/>
    <path d="M287 132 H385" stroke="#8aff6a" stroke-opacity="0.7" stroke-width="2"/>
    <path d="M287 172 H426" stroke="#8c7bff" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="287" cy="92" r="4" fill="#6ee7f5"/>
    <circle cx="287" cy="132" r="4" fill="#8aff6a"/>
    <circle cx="287" cy="172" r="4" fill="#8c7bff"/>
    <text x="286" y="223" class="small">A + route junction + protected gateway</text>
  </g>

  <!-- 3 Digital application -->
  <g transform="translate(1070 90)">
    <text x="28" y="36" class="label">03 / PRODUCT SURFACE</text>
    <rect x="30" y="62" width="400" height="166" rx="12" fill="#080a0c" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="30" y="62" width="400" height="38" rx="12" fill="#111518"/>
    <circle cx="52" cy="82" r="5" fill="#ff6b5d" opacity="0.8"/>
    <circle cx="70" cy="82" r="5" fill="#ffd166" opacity="0.8"/>
    <circle cx="88" cy="82" r="5" fill="#8aff6a" opacity="0.8"/>
    <rect x="126" y="73" width="180" height="18" rx="9" fill="#070809" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="142" y="86" class="small" font-size="11">127.0.0.1:2002</text>
    <g transform="translate(55 123)" color="#6ee7f5">
      <use href="#arkrouteMark" width="44" height="44"/>
    </g>
    <text x="116" y="148" class="body" font-size="24" font-weight="700">Route status</text>
    <rect x="116" y="165" width="88" height="26" rx="13" fill="#6ee7f5" fill-opacity="0.12" stroke="#6ee7f5" stroke-opacity="0.35"/>
    <text x="136" y="183" class="small" font-size="12" fill="#6ee7f5">openai</text>
    <rect x="214" y="165" width="96" height="26" rx="13" fill="#8aff6a" fill-opacity="0.1" stroke="#8aff6a" stroke-opacity="0.3"/>
    <text x="235" y="183" class="small" font-size="12" fill="#8aff6a">gemini</text>
    <rect x="320" y="165" width="78" height="26" rx="13" fill="#8c7bff" fill-opacity="0.12" stroke="#8c7bff" stroke-opacity="0.3"/>
    <text x="339" y="183" class="small" font-size="12" fill="#8c7bff">local</text>
  </g>

  <!-- 4 Tagline -->
  <g transform="translate(70 390)">
    <text x="28" y="36" class="label">04 / BRAND ESSENCE</text>
    <text x="28" y="120" class="body" font-size="54" font-weight="720">Route with</text>
    <text x="28" y="176" class="body" font-size="54" font-weight="720" fill="#6ee7f5">control.</text>
    <path d="M302 145 C350 95 382 95 432 145" fill="none" stroke="url(#routeMist)" stroke-width="3"/>
  </g>

  <!-- 5 Palette -->
  <g transform="translate(570 390)">
    <text x="28" y="36" class="label">05 / COLOR SYSTEM</text>
    <g transform="translate(28 70)">
      <rect x="0" y="0" width="76" height="96" rx="8" fill="#060708"/>
      <rect x="88" y="0" width="76" height="96" rx="8" fill="#15191c"/>
      <rect x="176" y="0" width="76" height="96" rx="8" fill="#e9f4f2"/>
      <rect x="264" y="0" width="76" height="96" rx="8" fill="#6ee7f5"/>
      <rect x="352" y="0" width="76" height="96" rx="8" fill="#8aff6a"/>
      <text x="0" y="124" class="small" font-size="12">black</text>
      <text x="88" y="124" class="small" font-size="12">charcoal</text>
      <text x="176" y="124" class="small" font-size="12">signal white</text>
      <text x="264" y="124" class="small" font-size="12">route cyan</text>
      <text x="352" y="124" class="small" font-size="12">control lime</text>
    </g>
  </g>

  <!-- 6 Typography -->
  <g transform="translate(1070 390)">
    <text x="28" y="36" class="label">06 / TYPE SYSTEM</text>
    <text x="28" y="108" class="body" font-size="52" font-weight="760">ARKROUTE</text>
    <text x="30" y="146" class="mono" font-size="22">arkroute setup --port 2002</text>
    <text x="30" y="184" class="small">Sans for confidence. Mono for command surfaces.</text>
  </g>

  <!-- 7 Physical application -->
  <g transform="translate(70 650)">
    <text x="28" y="36" class="label">07 / APPLICATION</text>
    <rect x="62" y="74" width="260" height="150" rx="14" fill="#101316" stroke="#ffffff" stroke-opacity="0.1" transform="rotate(-5 192 149)"/>
    <rect x="92" y="58" width="260" height="150" rx="14" fill="#15191c" stroke="#ffffff" stroke-opacity="0.13" transform="rotate(4 222 133)"/>
    <g transform="translate(125 88)" color="#e9f4f2">
      <use href="#arkrouteMark" width="72" height="72"/>
    </g>
    <text x="218" y="128" class="body" font-size="28" font-weight="700">Arkroute</text>
    <text x="220" y="154" class="label">GATEWAY BADGE</text>
    <circle cx="374" cy="180" r="34" fill="#6ee7f5" fill-opacity="0.13" stroke="#6ee7f5" stroke-opacity="0.35"/>
    <g transform="translate(351 157)" color="#6ee7f5">
      <use href="#arkrouteMark" width="46" height="46"/>
    </g>
  </g>

  <!-- 8 Image direction -->
  <g transform="translate(570 650)">
    <text x="28" y="36" class="label">08 / IMAGE DIRECTION</text>
    <rect x="28" y="62" width="404" height="162" rx="10" fill="#060708"/>
    <rect x="28" y="62" width="404" height="162" rx="10" fill="url(#dots)"/>
    <path d="M58 190 C150 112 220 232 314 92 C350 45 396 86 430 68" fill="none" stroke="#6ee7f5" stroke-opacity="0.8" stroke-width="3"/>
    <path d="M58 202 C170 142 213 173 300 140 C350 120 386 140 430 114" fill="none" stroke="#8aff6a" stroke-opacity="0.48" stroke-width="2"/>
    <path d="M58 170 C142 158 204 84 284 112 C352 136 380 72 430 94" fill="none" stroke="#8c7bff" stroke-opacity="0.42" stroke-width="2"/>
    <circle cx="314" cy="92" r="7" fill="#6ee7f5"/>
    <circle cx="300" cy="140" r="5" fill="#8aff6a"/>
    <circle cx="284" cy="112" r="5" fill="#8c7bff"/>
    <text x="28" y="246" class="small">cinematic paths / local tunnels / signal grain</text>
  </g>

  <!-- 9 System detail -->
  <g transform="translate(1070 650)">
    <text x="28" y="36" class="label">09 / SYSTEM DETAIL</text>
    <rect x="28" y="66" width="404" height="62" rx="12" fill="#080a0c" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="52" y="104" class="mono" font-size="20"><tspan fill="#8aff6a">$</tspan> npm install -g arkroute</text>
    <rect x="28" y="146" width="404" height="62" rx="12" fill="#080a0c" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="52" y="184" class="mono" font-size="20"><tspan fill="#6ee7f5">$</tspan> arkroute setup</text>
    <g transform="translate(30 230)">
      <rect x="0" y="0" width="98" height="28" rx="14" fill="#6ee7f5" fill-opacity="0.12" stroke="#6ee7f5" stroke-opacity="0.35"/>
      <text x="20" y="19" class="small" font-size="12">route</text>
      <rect x="112" y="0" width="112" height="28" rx="14" fill="#8aff6a" fill-opacity="0.1" stroke="#8aff6a" stroke-opacity="0.32"/>
      <text x="132" y="19" class="small" font-size="12">control</text>
      <rect x="238" y="0" width="132" height="28" rx="14" fill="#8c7bff" fill-opacity="0.1" stroke="#8c7bff" stroke-opacity="0.28"/>
      <text x="258" y="19" class="small" font-size="12">fallback</text>
    </g>
  </g>
</svg>
