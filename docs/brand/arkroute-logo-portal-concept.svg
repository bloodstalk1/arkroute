<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Arkroute terminal portal identity concept</title>
  <desc id="desc">A premium dark brand-kit concept for Arkroute using a terminal portal, command cursor, and routing aperture logo direction.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090908"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181a19"/>
      <stop offset="1" stop-color="#0b0d0c"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbf1"/>
      <stop offset="0.45" stop-color="#82f25c"/>
      <stop offset="1" stop-color="#42d8ff"/>
    </linearGradient>
    <filter id="glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.95 0 0 0 0 0.55 0 0 0 0.22 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000" flood-opacity="0.44"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#fff" stroke-opacity="0.035"/>
    </pattern>
    <symbol id="portalMark" viewBox="0 0 300 300">
      <path d="M33 150H65M235 150H267" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round"/>
      <path d="M88 64H212C225 64 236 75 236 88V212C236 225 225 236 212 236H88C75 236 64 225 64 212V88C64 75 75 64 88 64Z" fill="#0a0d0c" stroke="currentColor" stroke-width="14"/>
      <path d="M88 88H212V212H88Z" fill="none" stroke="currentColor" stroke-width="6" opacity=".28"/>
      <path d="M104 126L132 150L104 174" fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M150 174H194" fill="none" stroke="currentColor" stroke-width="17" stroke-linecap="round"/>
      <path d="M64 150H88M212 150H236" fill="none" stroke="currentColor" stroke-width="12" stroke-linecap="round" opacity=".85"/>
      <circle cx="267" cy="150" r="7" fill="currentColor"/>
      <circle cx="33" cy="150" r="7" fill="currentColor"/>
      <rect x="145" y="144" width="18" height="12" rx="4" fill="#0a0d0c"/>
    </symbol>
    <style>
      .label{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;letter-spacing:2px;fill:#747d77}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f4fbf1}
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#f4fbf1}
      .muted{fill:#8f988f}
      .panel{fill:url(#panel);stroke:#fff;stroke-opacity:.075;stroke-width:1}
      .rule{stroke:#fff;stroke-opacity:.09;stroke-width:1}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity=".65"/>

  <text x="74" y="64" class="label">ARKROUTE / TERMINAL PORTAL IDENTITY / CONCEPT 05</text>
  <text x="1460" y="64" class="label" text-anchor="end">COMMAND ROUTER</text>

  <g filter="url(#shadow)">
    <rect x="70" y="100" width="730" height="430" rx="10" class="panel"/>
    <rect x="830" y="100" width="700" height="200" rx="10" class="panel"/>
    <rect x="830" y="330" width="700" height="200" rx="10" class="panel"/>
    <rect x="70" y="560" width="450" height="340" rx="10" class="panel"/>
    <rect x="550" y="560" width="450" height="340" rx="10" class="panel"/>
    <rect x="1030" y="560" width="500" height="340" rx="10" class="panel"/>
  </g>

  <g transform="translate(70 100)">
    <text x="34" y="42" class="label">01 / PRIMARY MARK</text>
    <g transform="translate(100 78)" color="#f4fbf1" filter="url(#glow)">
      <use href="#portalMark" width="238" height="238"/>
    </g>
    <text x="386" y="205" class="sans" font-size="72" font-weight="760">Arkroute</text>
    <text x="392" y="250" class="label">TERMINAL PORTAL FOR AI MODELS</text>
    <path d="M392 284H650" class="rule"/>
    <text x="392" y="322" class="mono" font-size="20"><tspan fill="#82f25c">$</tspan> one prompt, routed cleanly</text>
  </g>

  <g transform="translate(830 100)">
    <text x="30" y="42" class="label">02 / SYMBOL STRATEGY</text>
    <text x="30" y="104" class="sans" font-size="42" font-weight="720">A command</text>
    <text x="30" y="150" class="sans" font-size="42" font-weight="720" fill="#82f25c">becomes a route.</text>
    <rect x="446" y="72" width="154" height="78" rx="14" fill="#070907" stroke="#82f25c" stroke-opacity=".42"/>
    <text x="476" y="122" class="mono" font-size="30" fill="#82f25c">&gt;_</text>
  </g>

  <g transform="translate(830 330)">
    <text x="30" y="42" class="label">03 / PRODUCT SURFACE</text>
    <rect x="30" y="70" width="620" height="92" rx="14" fill="#070907" stroke="#fff" stroke-opacity=".1"/>
    <circle cx="60" cy="100" r="5" fill="#ff6d5e"/>
    <circle cx="78" cy="100" r="5" fill="#ffd166"/>
    <circle cx="96" cy="100" r="5" fill="#82f25c"/>
    <text x="126" y="107" class="mono muted" font-size="16">arkroute test sonnet "hello"</text>
    <g transform="translate(448 76)" color="#42d8ff">
      <use href="#portalMark" width="52" height="52"/>
    </g>
    <text x="520" y="108" class="sans" font-size="24" font-weight="700">ready</text>
  </g>

  <g transform="translate(70 560)">
    <text x="30" y="42" class="label">04 / CONSTRUCTION</text>
    <rect x="70" y="72" width="210" height="200" fill="url(#grid)" stroke="#fff" stroke-opacity=".08"/>
    <rect x="98" y="104" width="154" height="136" rx="18" fill="none" stroke="#82f25c" stroke-opacity=".35" stroke-width="2"/>
    <path d="M106 172L148 140L148 204Z" fill="none" stroke="#42d8ff" stroke-opacity=".32" stroke-width="2"/>
    <g transform="translate(58 62)" color="#f4fbf1">
      <use href="#portalMark" width="224" height="224"/>
    </g>
    <text x="30" y="306" class="mono muted" font-size="15">terminal frame / prompt arrow / routed aperture</text>
  </g>

  <g transform="translate(550 560)">
    <text x="30" y="42" class="label">05 / PALETTE</text>
    <rect x="30" y="82" width="76" height="112" rx="10" fill="#050605"/>
    <rect x="118" y="82" width="76" height="112" rx="10" fill="#181a19"/>
    <rect x="206" y="82" width="76" height="112" rx="10" fill="#f4fbf1"/>
    <rect x="294" y="82" width="76" height="112" rx="10" fill="#82f25c"/>
    <rect x="30" y="220" width="340" height="36" rx="18" fill="url(#signal)"/>
    <text x="30" y="306" class="mono muted" font-size="15">void / terminal green / cyan route signal</text>
  </g>

  <g transform="translate(1030 560)">
    <text x="30" y="42" class="label">06 / COMMAND APPLICATION</text>
    <text x="30" y="112" class="sans" font-size="48" font-weight="740">Open the</text>
    <text x="30" y="164" class="sans" font-size="48" font-weight="740" fill="#82f25c">right route.</text>
    <rect x="30" y="206" width="420" height="54" rx="12" fill="#070907" stroke="#fff" stroke-opacity=".1"/>
    <text x="54" y="240" class="mono" font-size="18"><tspan fill="#82f25c">$</tspan> arkroute setup</text>
    <rect x="30" y="278" width="112" height="28" rx="14" fill="#82f25c" fill-opacity=".1" stroke="#82f25c" stroke-opacity=".32"/>
    <text x="54" y="297" class="mono muted" font-size="12">prompt</text>
    <rect x="156" y="278" width="112" height="28" rx="14" fill="#42d8ff" fill-opacity=".1" stroke="#42d8ff" stroke-opacity=".3"/>
    <text x="180" y="297" class="mono muted" font-size="12">route</text>
    <rect x="282" y="278" width="132" height="28" rx="14" fill="#82f25c" fill-opacity=".08" stroke="#82f25c" stroke-opacity=".24"/>
    <text x="306" y="297" class="mono muted" font-size="12">provider</text>
  </g>
</svg>
