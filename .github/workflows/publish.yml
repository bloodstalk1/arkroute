name: Publish to NPM

on:
  push:
    tags:
      - 'v*'   # Trigger khi push tag: git tag v0.0.1 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag (strip leading 'v')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Run tests
        run: npm test

      - name: Install frontend dependencies
        run: npm ci --prefix web-ui

      - name: Build frontend + all platform binaries
        run: make build-npm VERSION=${{ env.VERSION }}

      - name: Bump version in all npm packages
        run: |
          npm version ${{ env.VERSION }} --allow-same-version --no-git-tag-version --prefix npm/arkroute
          for p in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64; do
            npm version ${{ env.VERSION }} --allow-same-version --no-git-tag-version --prefix npm/platform/$p
          done

      - name: Update optionalDependencies version in main package
        run: |
          node -e "
            import { readFileSync, writeFileSync } from 'fs';
            const pkg = JSON.parse(readFileSync('npm/arkroute/package.json', 'utf8'));
            const v = process.env.VERSION;
            Object.keys(pkg.optionalDependencies).forEach(k => pkg.optionalDependencies[k] = v);
            writeFileSync('npm/arkroute/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ env.VERSION }}

      - name: Publish platform packages
        run: |
          publish_if_missing() {
            local package="$1"
            local path="$2"
            if npm view "$package@${VERSION}" version >/dev/null 2>&1; then
              echo "$package@${VERSION} already exists; skipping."
              return
            fi
            npm publish "$path" --access public --provenance
          }
          for p in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64; do
            echo "Publishing @arkroute/$p..."
            publish_if_missing "@arkroute/$p" "./npm/platform/$p"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          package="arkroute"
          if npm view "$package@${VERSION}" version >/dev/null 2>&1; then
            echo "$package@${VERSION} already exists; skipping."
          else
            npm publish ./npm/arkroute --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish
        run: |
          echo "✅ Published arkroute@${{ env.VERSION }} to npm registry"
          echo "Users can now run: npm install -g arkroute"
